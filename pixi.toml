[workspace]
authors = ["hepingtao <hepingtao@live.com>"]
channels = ["conda-forge"]
name = "X"
platforms = ["win-64"]
version = "0.1.0"

[tasks]
start = "python -m uvicorn app.main:app --host 0.0.0.0 --port 4936 --reload"

[dependencies]
python = "3.12.*"

[pypi-dependencies]
fastapi = ">=0.115.0"
uvicorn = {version = ">=0.30.0", extras = ["standard"]}
httpx = ">=0.27.0"
pydantic = ">=2.0.0"
pydantic-settings = ">=2.0.0"
pyyaml = ">=6.0"
python-dotenv = ">=1.0.0"

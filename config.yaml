# Log settings
log_dir: logs
max_log_size_mb: 100

# Provider-level defaults (inherited by models, can be overridden per-model)
providers:
  anthropic:
    base_url: "https://api.anthropic.com"
    api_version: "2023-06-01"
    api_key_env: CLAUDE_API_KEY
    models:
      claude-sonnet-4-20250514: {}
      claude-opus-4-20250514: {}

  openai:
    base_url: "https://api.openai.com"
    api_key_env: OPENAI_API_KEY
    models:
      gpt-4o: {}
      gpt-4o-mini: {}

  deepseek:
    base_url:
      openai: "https://api.deepseek.com"
      anthropic: "https://api.deepseek.com/anthropic"
    api_key_env: DEEPSEEK_API_KEY
    models:
      deepseek-v4-flash: {}
      deepseek-v4-pro:
        reasoning_effort: "max"

  qwen:
    base_url: "https://token-plan.cn-beijing.maas.aliyuncs.com/apps/anthropic"
    api_key_env: QWEN_API_KEY
    models:
      qwen3.6-plus: {}

  qwen-coder:
    base_url: "http://192.168.31.20:8000"
    api_key_env: QWEN_API_KEY
    models:
      Qwen3.6-Coder: {}

# Default model when client doesn't specify
default_model: Qwen3.6-Coder

# Model alias mapping (downstream name -> actual model name)
aliases:
  cc-coder: Qwen3.6-Coder
